<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Share Graph</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="network"></div>

    <button type="button" class="theme-toggle" onclick="toggleTheme()">Switch to Dark</button>

    <div class="instructions">
        <span>Drag to move</span>
        <span>Scroll to zoom</span>
        <span>Click nodes for details</span>
    </div>

    <div class="legend">
        <h4>Node Types</h4>
        <div class="legend-item">
            <div class="legend-shape"><div class="legend-hex" style="background: #c75b39;"></div></div>
            <span>Diesel Engine</span>
        </div>
        <div class="legend-item">
            <div class="legend-shape"><div class="legend-hex" style="background: #d4a84b;"></div></div>
            <span>Petrol Engine</span>
        </div>
        <div class="legend-item">
            <div class="legend-shape"><div class="legend-hex" style="background: #5a9c6d;"></div></div>
            <span>Hybrid Engine</span>
        </div>
        <div class="legend-item">
            <div class="legend-shape"><div class="legend-circle"></div></div>
            <span>Car</span>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <span class="type-badge" id="infoType">Engine</span>
        <h3 id="infoTitle">Engine Name</h3>
        <div id="infoDetails"></div>
    </div>

    <div class="search-modal" id="searchModal">
        <div class="search-container">
            <div class="search-input-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="Search cars or engines..." autocomplete="off">
            </div>
            <div class="search-results" id="searchResults"></div>
            <div class="search-hint">
                <kbd>↑</kbd><kbd>↓</kbd> navigate &nbsp; <kbd>Enter</kbd> select &nbsp; <kbd>Esc</kbd> close
            </div>
        </div>
    </div>

    <script src="data/engines.js"></script>
    <script src="data/cars.js"></script>
    <script src="app.js"></script>
</body>
</html>
