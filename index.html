<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Share Graph</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f2eb;
            --text: #2d2d2d;
            --text-muted: #8b7355;
            --panel-bg: rgba(245, 242, 235, 0.95);
            --panel-border: rgba(160, 128, 96, 0.2);
            --legend-bg: rgba(245, 242, 235, 0.9);
            --shadow: rgba(160, 128, 96, 0.15);
            --edge: rgba(160, 128, 96, 0.5);
            --car-bg: #4a4a4a;
            --font-bg: rgba(245, 242, 235, 0.8);
        }

        [data-theme="dark"] {
            --bg: #0d0d0d;
            --text: #e8e8e8;
            --text-muted: #a08060;
            --panel-bg: rgba(20, 20, 25, 0.95);
            --panel-border: rgba(160, 128, 96, 0.15);
            --legend-bg: rgba(20, 20, 25, 0.9);
            --shadow: rgba(0, 0, 0, 0.4);
            --edge: rgba(180, 150, 110, 0.5);
            --car-bg: #b0b0b0;
            --font-bg: rgba(13, 13, 13, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        #network {
            width: 100%;
            height: 100vh;
            background: var(--bg);
            transition: background 0.3s;
            cursor: grab;
        }

        #network:active {
            cursor: grabbing;
        }

        .theme-toggle {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            z-index: 200;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background: var(--text-muted);
            color: var(--bg);
        }

        .vis-network canvas {
            cursor: grab;
        }

        .vis-network canvas:active {
            cursor: grabbing;
        }

        .info-panel {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 20px 24px;
            min-width: 280px;
            max-width: 340px;
            box-shadow: 0 8px 32px var(--shadow);
            transform: translateY(120%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .info-panel.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .info-panel h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
            letter-spacing: 0.3px;
        }

        .info-panel .type-badge {
            display: inline-block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 14px;
            font-weight: 500;
        }

        .info-panel .type-badge.engine {
            background: rgba(199, 91, 57, 0.15);
            color: #c75b39;
            border: 1px solid rgba(199, 91, 57, 0.3);
        }

        .info-panel .type-badge.car {
            background: rgba(176, 176, 176, 0.15);
            color: #b0b0b0;
            border: 1px solid rgba(176, 176, 176, 0.3);
        }

        .info-panel .detail {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--panel-border);
            font-size: 13px;
        }

        .info-panel .detail:last-child {
            border-bottom: none;
        }

        .info-panel .detail-label {
            color: var(--text-muted);
        }

        .info-panel .detail-value {
            color: var(--text);
            font-weight: 500;
        }

        .legend {
            position: fixed;
            top: 24px;
            right: 24px;
            background: var(--legend-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 16px 20px;
            font-size: 12px;
        }

        .legend h4 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-shape {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .legend-hex {
            width: 12px;
            height: 10px;
            background: #c75b39;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        .legend-circle {
            width: 12px;
            height: 12px;
            background: var(--car-bg);
            border: 2px dashed var(--text-muted);
            border-radius: 50%;
            box-sizing: border-box;
        }

        .instructions {
            position: fixed;
            bottom: 24px;
            right: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .instructions span {
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div id="network"></div>

    <button type="button" class="theme-toggle" onclick="toggleTheme()">Switch to Dark</button>

    <div class="instructions">
        <span>Drag to move</span>
        <span>Scroll to zoom</span>
        <span>Click nodes for details</span>
    </div>

    <div class="legend">
        <h4>Node Types</h4>
        <div class="legend-item">
            <div class="legend-shape"><div class="legend-hex" style="background: #c75b39;"></div></div>
            <span>Diesel Engine</span>
        </div>
        <div class="legend-item">

        </div>
        <div class="legend-item">

        </div>
        <div class="legend-item">
            <div class="legend-shape"><div class="legend-circle"></div></div>
            <span>Car</span>

    </div>

    <div class="info-panel" id="infoPanel">

        const fuelColors = {
            diesel: "#c75b39",
            petrol: "#d4a84b",
            hybrid: "#5a9c6d"
        };

        let currentTheme = 'light';
        
        function getColors() {
            if (currentTheme === 'dark') {
                return {
                    text: '#e8e8e8',
                    fontBg: 'rgba(13, 13, 13, 0.85)',
                    car: '#b0b0b0',
                    edge: 'rgba(180, 150, 110, 0.5)'
                };
            }
            return {
                text: '#2d2d2d',
                fontBg: 'rgba(245, 242, 235, 0.8)',
                car: '#4a4a4a',
                edge: 'rgba(160, 128, 96, 0.5)'
            };
        }

        function buildGraph() {
            const colors = getColors();
            const nodes = [];
            const edges = [];

            engines.forEach(engine => {
                nodes.push({
                    id: engine.id,
                    label: engine.name,
                    group: "engine",
                    shape: "hexagon",
                    size: 26,
                    color: {
                        background: fuelColors[engine.fuel],
                        border: fuelColors[engine.fuel],
                        highlight: { background: fuelColors[engine.fuel], border: colors.text }
                    },
                    font: { color: colors.text, background: colors.fontBg },
                    data: engine
                });
            });

            cars.forEach((car, i) => {
                nodes.push({
                    id: car.id,
                    label: car.name,
                    group: "car",
                    shape: "dot",
                    size: 20,
                    color: {
                        background: colors.car,
                        border: colors.car,
                        highlight: { background: "#fff", border: "#fff" }
                    },
                    font: { color: colors.text, background: colors.fontBg },
                    data: car
                });

                car.engines.forEach(engineId => {
                    edges.push({
                        from: car.id,
                        to: engineId,
                        color: { color: colors.edge, highlight: colors.edge },
                        width: 2,
                        smooth: { type: "continuous" }
                    });
                });
            });

            return { nodes, edges };
        }

        const graphData = buildGraph();
        const container = document.getElementById("network");
        const data = { nodes: new vis.DataSet(graphData.nodes), edges: new vis.DataSet(graphData.edges) };

        const options = {
            nodes: {
                borderWidth: 3,
                shadow: { enabled: true, color: "rgba(160, 128, 96, 0.3)", size: 10, x: 0, y: 4 }
            },
            edges: {
                arrows: { to: { enabled: true, scaleFactor: 0.6 } }
            },
            physics: {
                enabled: true,
                solver: "forceAtlas2Based",
                forceAtlas2Based: { 
                    gravitationalConstant: -100, 
                    centralGravity: 0.01, 
                    springLength: 150,
                    springConstant: 0.02
                },
                stabilization: { iterations: 300 }
            },
            interaction: {
                hover: true,
                tooltipDelay: 200
            }
        };

        const network = new vis.Network(container, data, options);

        network.on("hoverNode", function () {
            container.style.cursor = 'pointer';
        });

        network.on("blurNode", function () {
            container.style.cursor = 'grab';
        });

        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved) {
                currentTheme = saved;
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                currentTheme = 'dark';
            }
            applyTheme(false);
        }

        function applyTheme(save) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = currentTheme === 'light' ? 'Switch to Dark' : 'Switch to Light';

            const colors = getColors();
            data.nodes.forEach(function(node) {
                const isCar = node.group === 'car';
                data.nodes.update({
                    id: node.id,
                    color: {
                        background: isCar ? colors.car : node.color.background,
                        border: isCar ? colors.car : node.color.border,
                        highlight: { background: isCar ? '#fff' : node.color.background, border: colors.text }
                    },
                    font: { color: colors.text, background: colors.fontBg }
                });
            });
            
            data.edges.forEach(function(edge) {
                data.edges.update({
                    id: edge.id,
                    color: { color: colors.edge, highlight: colors.edge }
                });
            });

            if (save) {
                localStorage.setItem('theme', currentTheme);
            }
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme(true);
        }

        initTheme();

        const infoPanel = document.getElementById("infoPanel");
        const infoType = document.getElementById("infoType");
        const infoTitle = document.getElementById("infoTitle");
        const infoDetails = document.getElementById("infoDetails");

        network.on("click", function (params) {
            if (params.nodes.length === 0) {
                infoPanel.classList.remove("visible");
                resetEdgeStyles();
                return;
            }

            const nodeId = params.nodes[0];
            const node = data.nodes.get(nodeId);
            const colors = getColors();

            if (node.group === "engine") {
                const e = node.data;
                infoType.textContent = "Engine";
                infoType.className = "type-badge engine";
                infoTitle.textContent = e.name;
                infoDetails.innerHTML = `
                    <div class="detail"><span class="detail-label">Displacement</span><span class="detail-value">${e.displacement}</span></div>
                    <div class="detail"><span class="detail-label">Power</span><span class="detail-value">${e.power}</span></div>
                    <div class="detail"><span class="detail-label">Fuel</span><span class="detail-value" style="text-transform:capitalize">${e.fuel}</span></div>
                    <div class="detail"><span class="detail-label">Cylinders</span><span class="detail-value">${e.cylinders}</span></div>
                    ${e.code ? `<div class="detail"><span class="detail-label">Code</span><span class="detail-value">${e.code}</span></div>` : ""}
                    <div class="detail"><span class="detail-label">Years</span><span class="detail-value">${e.yearRange}</span></div>
                    ${e.notes ? `<div class="detail"><span class="detail-label">Notes</span><span class="detail-value">${e.notes}</span></div>` : ""}
                `;

                data.edges.forEach(function(edge) {
                    if (edge.to === nodeId || edge.from === nodeId) {
                        data.edges.update({
                            id: edge.id,
                            color: { color: colors.text, highlight: colors.text },
                            width: 3
                        });
                    }
                });
            } else {
                const c = node.data;
                const engineNames = c.engines.map(id => {
                    const eng = engines.find(e => e.id === id);
                    return eng ? eng.name : id;
                }).join(", ");
                infoType.textContent = "Car";
                infoType.className = "type-badge car";
                infoTitle.textContent = c.name;
                infoDetails.innerHTML = `
                    <div class="detail"><span class="detail-label">Brand</span><span class="detail-value">${c.brand}</span></div>
                    <div class="detail"><span class="detail-label">Engines</span><span class="detail-value" style="font-size:11px">${engineNames}</span></div>
                `;

                c.engines.forEach(function(engineId) {
                    data.edges.forEach(function(edge) {
                        if ((edge.from === nodeId && edge.to === engineId) || (edge.from === engineId && edge.to === nodeId)) {
                            data.edges.update({
                                id: edge.id,
                                color: { color: colors.text, highlight: colors.text },
                                width: 3
                            });
                        }
                    });
                });
            }

            infoPanel.classList.add("visible");
        });

        function resetEdgeStyles() {
            const colors = getColors();
            data.edges.forEach(function(edge) {
                data.edges.update({
                    id: edge.id,
                    color: { color: colors.edge, highlight: colors.edge },
                    width: 2
                });
            });
        }
    </script>
</body>
</html>
