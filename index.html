<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Share Graph</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5f2eb;
            color: #2d2d2d;
            overflow: hidden;
            height: 100vh;
        }

        #network {
            width: 100%;
            height: 100vh;
            background: #f5f2eb;
        }

        .info-panel {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: rgba(245, 242, 235, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(160, 128, 96, 0.2);
            border-radius: 12px;
            padding: 20px 24px;
            min-width: 280px;
            max-width: 340px;
            box-shadow: 0 8px 32px rgba(160, 128, 96, 0.15);
            transform: translateY(120%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .info-panel.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .info-panel h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #2d2d2d;
            letter-spacing: 0.3px;
        }

        .info-panel .type-badge {
            display: inline-block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 14px;
            font-weight: 500;
        }

        .info-panel .type-badge.engine {
            background: rgba(199, 91, 57, 0.15);
            color: #c75b39;
            border: 1px solid rgba(199, 91, 57, 0.3);
        }

        .info-panel .type-badge.car {
            background: rgba(74, 74, 74, 0.15);
            color: #4a4a4a;
            border: 1px solid rgba(74, 74, 74, 0.3);
        }

        .info-panel .detail {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(160, 128, 96, 0.1);
            font-size: 13px;
        }

        .info-panel .detail:last-child {
            border-bottom: none;
        }

        .info-panel .detail-label {
            color: #8b7355;
        }

        .info-panel .detail-value {
            color: #2d2d2d;
            font-weight: 500;
        }

        .legend {
            position: fixed;
            top: 24px;
            right: 24px;
            background: rgba(245, 242, 235, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(160, 128, 96, 0.15);
            border-radius: 10px;
            padding: 16px 20px;
            font-size: 12px;
        }

        .legend h4 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b7355;
            margin-bottom: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-shape {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .legend-hex {
            width: 12px;
            height: 10px;
            background: #c75b39;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        }

        .legend-circle {
            width: 12px;
            height: 12px;
            background: #4a4a4a;
            border: 2px dashed #8b7355;
            border-radius: 50%;
            box-sizing: border-box;
        }

        .instructions {
            position: fixed;
            top: 24px;
            left: 24px;
            font-size: 12px;
            color: #8b7355;
        }

        .instructions span {
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div id="network"></div>

    <div class="instructions">
        <span>Drag to move</span>
        <span>Scroll to zoom</span>
        <span>Click nodes for details</span>
    </div>

    <div class="legend">
        <h4>Node Types</h4>
        <div class="legend-item">
            <div class="legend-shape"><div class="legend-hex" style="background: #c75b39;"></div></div>
            <span>Diesel Engine</span>
        </div>
        <div class="legend-item">
            <div class="legend-shape"><div class="legend-hex" style="background: #d4a84b;"></div></div>
            <span>Petrol Engine</span>
        </div>
        <div class="legend-item">
            <div class="legend-shape"><div class="legend-hex" style="background: #8b7355;"></div></div>
            <span>Hybrid Engine</span>
        </div>
        <div class="legend-item">
            <div class="legend-shape"><div class="legend-circle"></div></div>
            <span>Car</span>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <span class="type-badge" id="infoType">Engine</span>
        <h3 id="infoTitle">Engine Name</h3>
        <div id="infoDetails"></div>
    </div>

    <script>
        const engines = [
            {
                id: "fiat-multijet-II",
                name: "Fiat Multijet Diesel II",
                displacement: "2.0L",
                power: "170 HP",
                fuel: "diesel",
                family: "Multijet",
                cylinders: 4,
                yearRange: "2019-present"
            },
            {
                id: "suzuki-k15C",
                name: "Suzuki K15C",
                displacement: "1.5L",
                power: "103 HP",
                fuel: "petrol",
                family: "K",
                cylinders: 4,
                yearRange: "2022-present",
                notes: "Mild Hybrid"
            },
            {
                id: "toyota-m15D-FXE",
                name: "Toyota M15D-FXE",
                displacement: "1.5L",
                power: "92 HP",
                fuel: "hybrid",
                family: "M15D",
                cylinders: 3,
                yearRange: "2022-present",
                notes: "Strong Hybrid"
            },
            {
                id: "hyundai-g4fl",
                name: "Smartstream G1.5 MPi",
                displacement: "1.5L",
                power: "115 HP",
                fuel: "petrol",
                family: "Gamma",
                cylinders: 4,
                code: "G4FL",
                yearRange: "2019-present"
            },
            {
                id: "hyundai-g4lh",
                name: "Smartstream G1.5 T-GDi",
                displacement: "1.5L",
                power: "160 HP",
                fuel: "petrol",
                family: "Kappa",
                cylinders: 4,
                code: "G4LH",
                yearRange: "2019-present",
                notes: "Turbocharged"
            },
            {
                id: "hyundai-d4fb",
                name: "1.5L CRDi VGT",
                displacement: "1.5L",
                power: "115 HP",
                fuel: "diesel",
                family: "U2",
                cylinders: 4,
                code: "D4FB",
                yearRange: "2019-present"
            },
            {
                id: "honda-l15b",
                name: "Honda L15B",
                displacement: "1.5L",
                power: "121 HP",
                fuel: "petrol",
                family: "L-series",
                cylinders: 4,
                yearRange: "2019-present",
                notes: "i-VTEC, DOHC, Atkinson Cycle"
            },
            {
                id: "honda-l15b-hev",
                name: "Honda L15B e:HEV",
                displacement: "1.5L",
                power: "98 HP",
                fuel: "hybrid",
                family: "L15B",
                cylinders: 4,
                code: "LEB-H5",
                yearRange: "2020-present",
                notes: "Strong Hybrid"
            }
        ];

        const cars = [
            {
                id: "tata-harrier",
                name: "Tata Harrier",
                brand: "Tata",
                engines: ["fiat-multijet-II"]
            },
            {
                id: "tata-safari",
                name: "Tata Safari",
                brand: "Tata",
                engines: ["fiat-multijet-II"]
            },
            {
                id: "mg-hector",
                name: "MG Hector",
                brand: "MG",
                engines: ["fiat-multijet-II"]
            },
            {
                id: "jeep-meridian",
                name: "Jeep Meridian",
                brand: "Jeep",
                engines: ["fiat-multijet-II"]
            },
            {
                id: "jeep-compass",
                name: "Jeep Compass",
                brand: "Jeep",
                engines: ["fiat-multijet-II"]
            },
            {
                id: "toyota-hyryder",
                name: "Toyota Hyryder",
                brand: "Toyota",
                engines: ["suzuki-k15C", "toyota-m15D-FXE"]
            },
            {
                id: "suzuki-grand-vitara",
                name: "Suzuki Grand Vitara",
                brand: "Suzuki",
                engines: ["suzuki-k15C", "toyota-m15D-FXE"]
            },
            {
                id: "kia-seltos",
                name: "Kia Seltos",
                brand: "Kia",
                engines: ["hyundai-g4fl", "hyundai-g4lh", "hyundai-d4fb"]
            },
            {
                id: "kia-sonet",
                name: "Kia Sonet",
                brand: "Kia",
                engines: ["hyundai-g4fl", "hyundai-g4lh", "hyundai-d4fb"]
            },
            {
                id: "hyundai-creta",
                name: "Hyundai Creta",
                brand: "Hyundai",
                engines: ["hyundai-g4fl", "hyundai-g4lh", "hyundai-d4fb"]
            },
            {
                id: "honda-city",
                name: "Honda City",
                brand: "Honda",
                engines: ["honda-l15b", "honda-l15b-hev"]
            },
            {
                id: "honda-elevate",
                name: "Honda Elevate",
                brand: "Honda",
                engines: ["honda-l15b"]
            }
        ];

        const fuelColors = {
            diesel: "#c75b39",
            petrol: "#d4a84b",
            hybrid: "#8b7355"
        };

        const nodes = [];
        const edges = [];

        const nodePositions = {
            "fiat-multijet-II": { x: -200, y: 0 },
            "suzuki-k15C": { x: 120, y: -100 },
            "toyota-m15D-FXE": { x: 240, y: -100 },
            "hyundai-g4fl": { x: 0, y: 100 },
            "hyundai-g4lh": { x: 140, y: 100 },
            "hyundai-d4fb": { x: 280, y: 100 },
            "honda-l15b": { x: 380, y: 0 },
            "honda-l15b-hev": { x: 500, y: 0 }
        };

        engines.forEach(engine => {
            nodes.push({
                id: engine.id,
                label: engine.name,
                group: "engine",
                shape: "hexagon",
                size: 26,
                x: nodePositions[engine.id]?.x,
                y: nodePositions[engine.id]?.y,
                color: {
                    background: fuelColors[engine.fuel],
                    border: fuelColors[engine.fuel],
                    highlight: { background: fuelColors[engine.fuel], border: "#2d2d2d" }
                },
                font: { color: "#2d2d2d", background: "rgba(245, 242, 235, 0.8)" },
                data: engine
            });
        });

        const carPositions = [
            { x: -400, y: -80 },
            { x: -400, y: -30 },
            { x: -400, y: 20 },
            { x: -400, y: 70 },
            { x: -400, y: 120 },
            { x: -40, y: -180 },
            { x: 40, y: -180 },
            { x: -40, y: 180 },
            { x: 40, y: 180 },
            { x: 160, y: 180 },
            { x: 280, y: -50 },
            { x: 400, y: 50 }
        ];

        cars.forEach((car, i) => {
            nodes.push({
                id: car.id,
                label: car.name,
                group: "car",
                shape: "dot",
                size: 20,
                x: carPositions[i].x,
                y: carPositions[i].y,
                color: {
                    background: "#4a4a4a",
                    border: "#4a4a4a",
                    highlight: { background: "#2d2d2d", border: "#2d2d2d" }
                },
                font: { color: "#2d2d2d", background: "rgba(245, 242, 235, 0.8)" },
                data: car
            });

            car.engines.forEach(engineId => {
                edges.push({
                    from: car.id,
                    to: engineId,
                    color: { color: "rgba(160, 128, 96, 0.5)", highlight: "rgba(160, 128, 96, 0.8)" },
                    width: 2,
                    smooth: { type: "continuous" }
                });
            });
        });

        const container = document.getElementById("network");
        const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };

        const options = {
            nodes: {
                borderWidth: 3,
                shadow: { enabled: true, color: "rgba(160, 128, 96, 0.3)", size: 10, x: 0, y: 4 }
            },
            edges: {
                arrows: { to: { enabled: true, scaleFactor: 0.6 } }
            },
            physics: {
                enabled: true,
                solver: "forceAtlas2Based",
                forceAtlas2Based: { 
                    gravitationalConstant: -100, 
                    centralGravity: 0.01, 
                    springLength: 150,
                    springConstant: 0.02
                },
                stabilization: { iterations: 300 }
            },
            interaction: {
                hover: true,
                tooltipDelay: 200
            }
        };

        const network = new vis.Network(container, data, options);

        const infoPanel = document.getElementById("infoPanel");
        const infoType = document.getElementById("infoType");
        const infoTitle = document.getElementById("infoTitle");
        const infoDetails = document.getElementById("infoDetails");

        network.on("click", function (params) {
            if (params.nodes.length === 0) {
                infoPanel.classList.remove("visible");
                return;
            }

            const nodeId = params.nodes[0];
            const node = data.nodes.get(nodeId);

            if (node.group === "engine") {
                const e = node.data;
                infoType.textContent = "Engine";
                infoType.className = "type-badge engine";
                infoTitle.textContent = e.name;
                infoDetails.innerHTML = `
                    <div class="detail"><span class="detail-label">Displacement</span><span class="detail-value">${e.displacement}</span></div>
                    <div class="detail"><span class="detail-label">Power</span><span class="detail-value">${e.power}</span></div>
                    <div class="detail"><span class="detail-label">Fuel</span><span class="detail-value" style="text-transform:capitalize">${e.fuel}</span></div>
                    <div class="detail"><span class="detail-label">Cylinders</span><span class="detail-value">${e.cylinders}</span></div>
                    ${e.code ? `<div class="detail"><span class="detail-label">Code</span><span class="detail-value">${e.code}</span></div>` : ""}
                    <div class="detail"><span class="detail-label">Years</span><span class="detail-value">${e.yearRange}</span></div>
                    ${e.notes ? `<div class="detail"><span class="detail-label">Notes</span><span class="detail-value">${e.notes}</span></div>` : ""}
                `;
            } else {
                const c = node.data;
                const engineNames = c.engines.map(id => {
                    const eng = engines.find(e => e.id === id);
                    return eng ? eng.name : id;
                }).join(", ");
                infoType.textContent = "Car";
                infoType.className = "type-badge car";
                infoTitle.textContent = c.name;
                infoDetails.innerHTML = `
                    <div class="detail"><span class="detail-label">Brand</span><span class="detail-value">${c.brand}</span></div>
                    <div class="detail"><span class="detail-label">Engines</span><span class="detail-value" style="font-size:11px">${engineNames}</span></div>
                `;
            }

            infoPanel.classList.add("visible");
        });
    </script>
</body>
</html>
